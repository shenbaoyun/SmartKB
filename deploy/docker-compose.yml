# ============================================================
# SmartKB Docker Compose — 生产部署
# 使用方法：
#   1. cp .env.example .env  &&  编辑 .env 填入真实配置
#   2. docker-compose up -d
#   3. docker-compose logs -f  查看日志
# ============================================================

version: "3.8"

services:
  # ==========================================================
  # MySQL 数据库
  # ==========================================================
  mysql:
    build: ./mysql
    container_name: smartkb-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smartkb123}
      MYSQL_DATABASE: smartkb
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - ./volumes/mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD:-smartkb123}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - smartkb-net

  # ==========================================================
  # Redis 缓存（预留：后续版本用于 Embedding 缓存 / Session）
  # ==========================================================
  redis:
    build: ./redis
    container_name: smartkb-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - ./volumes/redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - smartkb-net

  # ==========================================================
  # SmartKB 后端
  # ==========================================================
  backend:
    build: ./backend
    container_name: smartkb-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      BAILIAN_API_KEY: ${BAILIAN_API_KEY:-}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartkb?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smartkb123}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      - ./volumes/backend_data:/app/data
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - smartkb-net

  # ==========================================================
  # SmartKB 前端（Nginx 静态服务 + 反向代理 /api → backend）
  # ==========================================================
  frontend:
    build: ./frontend
    container_name: smartkb-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - smartkb-net

networks:
  smartkb-net:
    driver: bridge
