# SmartKB Nginx 网关（可选，多实例负载均衡时使用）
upstream smartkb_backend {
    server backend:8080;
}

upstream smartkb_frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name _;

    # 前端
    location / {
        proxy_pass http://smartkb_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://smartkb_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}